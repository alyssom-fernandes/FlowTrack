name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_key
          SUPABASE_JWT_SECRET: placeholder_jwt_secret_32chars_min
          INTERNAL_API_TOKEN: placeholder_internal_token
          ANTHROPIC_API_KEY: ""
          APP_ENV: test
        run: pytest tests/test_helpers.py -v --tb=short

      - name: Run integration tests
        working-directory: backend
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_key
          SUPABASE_JWT_SECRET: placeholder_jwt_secret_32chars_min
          INTERNAL_API_TOKEN: placeholder_internal_token
          ANTHROPIC_API_KEY: ""
          APP_ENV: test
        run: pytest tests/test_integration.py -v --tb=short

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint check
        working-directory: frontend
        run: npx eslint src --max-warnings=0
